<script>
const KEY="filmline-orders-v1";
const SHIFTS=["T1","T2","T3"];
const ACCOUNTS=[{user:"operador",pass:"1234",name:"Operador Demo",role:"operador"},{user:"gerente",pass:"1234",name:"Gerente Demo",role:"gerente"}];
const MAXROLLS=70;
const QA_MS=90*60*1000; // 1.5 h
const mem={v:null};

function p2(n){return String(n).padStart(2,"0")}
function p3(n){return String(n).padStart(3,"0")}
function today(){const d=new Date();return p2(d.getDate())+"/"+p2(d.getMonth()+1)+"/"+d.getFullYear()}
function now(){const d=new Date();return p2(d.getHours())+":"+p2(d.getMinutes())}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function wuOf(n){return ((n-1)%4)+1}
function conv(v,u){v=Number(v)||0;return u==="lbs"?`${v} lbs (${(v*0.453592).toFixed(1)} kg)`:`${v} kg (${(v/0.453592).toFixed(1)} lbs)`}
function parseTs(f,h){if(!f)return null;const m=/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(String(f).trim());if(!m)return null;const t=/^(\d{1,2}):(\d{2})$/.exec(String(h||"00:00").trim());const hh=t?+t[1]:0,mm=t?+t[2]:0;return new Date(+m[3],+m[2]-1,+m[1],hh,mm).getTime()}
function allRolls(o){return (o.corridas||[]).flatMap(c=>c.rolls)}
function orderScrapLbs(o){return (o.corridas||[]).reduce((s,c)=>s+(c.scrapUnidad==="kg"?(Number(c.scrapPeso)||0)/0.453592:(Number(c.scrapPeso)||0)),0)}
function qaPending(c){return !!c.arranqueTs && (!c.qa||!c.qa.done)}
function qaDue(c){return qaPending(c) && Date.now()>=c.arranqueTs+QA_MS}
function qaRemainingMs(c){return c.arranqueTs?(c.arranqueTs+QA_MS-Date.now()):null}
function fmtRemain(c){const ms=qaRemainingMs(c);if(ms==null)return"";if(ms<=0)return"vencido";const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return "en "+(h?h+"h ":"")+m+"m"}

function normalizeOrder(o){
  if(!o.corridas){
    o.corridas=[];
    if(Array.isArray(o.rolls)&&o.rolls.length){
      for(let i=0;i<o.rolls.length;i+=4){const g=o.rolls.slice(i,i+4);
        o.corridas.push({num:o.corridas.length+1,turno:o.turnoInicio||"",operador:o.createdBy||"",scrapPeso:"",scrapUnidad:"lbs",fecha:(g[0]&&g[0].fecha)||o.inicioFecha||"",hora:(g[0]&&g[0].hora)||"",rolls:g.map(r=>({rollo:r.rollo,wu:r.wu,peso:r.peso||"",grosor:r.grosor||"",fecha:r.fecha||"",hora:r.hora||""}))})}
    }
  }
  (o.corridas||[]).forEach(c=>{
    if(c.operadorNombre===undefined)c.operadorNombre=c.operador||"";
    if(c.operadorNum===undefined)c.operadorNum="";
    if(c.sku===undefined)c.sku="";
    if(c.maquina===undefined)c.maquina="";
    if(c.inicioFecha===undefined)c.inicioFecha=c.fecha||"";
    if(c.inicioHora===undefined)c.inicioHora=c.hora||"";
    if(c.arranqueFecha===undefined)c.arranqueFecha=c.fecha||"";
    if(c.arranqueHora===undefined)c.arranqueHora=c.hora||"";
    if(c.arranqueTs===undefined)c.arranqueTs=parseTs(c.arranqueFecha,c.arranqueHora);
    if(c.scrapUnidad===undefined)c.scrapUnidad="lbs";
    if(c.scrapPeso===undefined)c.scrapPeso="";
    if(c.qa===undefined)c.qa=null;
    (c.rolls||[]).forEach(r=>{if(r.grosor===undefined)r.grosor=""});
  });
  return o;
}
function load(){try{const a=JSON.parse(localStorage.getItem(KEY)||"[]");return a.map(normalizeOrder)}catch(e){return mem.v||[]}}
function save(v){mem.v=v;try{localStorage.setItem(KEY,JSON.stringify(v))}catch(e){}}
function newCform(){return{turno:"",sku:"",operadorNombre:"",operadorNum:"",maquina:"",inicioFecha:today(),inicioHora:now(),arranqueFecha:today(),arranqueHora:now(),pesos:["","","",""],grosores:["","","",""],scrapPeso:"",scrapUnidad:"lbs"}}

const S={user:null,orders:load(),view:"home",form:null,cur:null,detail:null,query:"",cform:newCform(),qaTarget:null,qaForm:null,qaAlerted:new Set()};
const $=s=>document.querySelector(s);const app=()=>$("#app");
function render(){if(!S.user){renderLogin();return}if(S.user.role==="operador")renderOperator();else renderManager()}
function scopeOrders(){return S.user.role==="operador"?S.orders.filter(o=>o.createdBy===S.user.name):S.orders}

/* LOGIN */
function renderLogin(){
  app().innerHTML=`<div class="login"><div class="lc">
    <div class="lh"><div class="lg">PX</div><h1>Registro de Rollos</h1><p>Film Line · PRAXA Control · RIVULIS</p><span class="badge">DEMO</span></div>
    <div class="card"><div class="stack">
      <div class="ipos"><span class="ic">◑</span><input id="u" class="inp pad" placeholder="Usuario"></div>
      <div class="ipos"><span class="ic">▦</span><input id="p" type="password" class="inp pad" placeholder="Contraseña"></div>
      <div id="le"></div><button class="btn btn-dark full" onclick="doLogin()">Entrar</button>
    </div><div class="accts"><p>Cuentas demo (toca para usar)</p><div class="ag">
      <button class="acct" onclick="quick(0)"><b>Operador</b><small>operador / 1234</small></button>
      <button class="acct" onclick="quick(1)"><b>Gerente</b><small>gerente / 1234</small></button>
    </div></div></div></div></div>`;
  $("#p").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
}
function quick(i){$("#u").value=ACCOUNTS[i].user;$("#p").value=ACCOUNTS[i].pass;$("#le").innerHTML=""}
function doLogin(){const u=$("#u").value.trim().toLowerCase(),p=$("#p").value.trim();const a=ACCOUNTS.find(x=>x.user===u&&x.pass===p);if(a){S.user=a;S.view="home";render()}else $("#le").innerHTML='<div class="err">Usuario o contraseña incorrectos</div>'}
function logout(){S.user=null;render()}
function topbar(right){return `<div class="top"><div class="top-in"><div class="brand"><div class="logo">PX</div><div><b>Registro de Rollos</b><small>${esc(S.user.name)} · ${S.user.role==="operador"?"Operador":"Gerente"}</small></div></div><div class="row">${right||""}<button class="btn btn-ghost" onclick="logout()">Salir</button></div></div></div>`}

/* QA BANNER */
function qaBannerHTML(orders){
  const due=[];orders.forEach(o=>(o.corridas||[]).forEach(c=>{if(qaDue(c))due.push({o,c})}));
  if(!due.length)return "";
  const f=due[0];
  return `<div class="qabanner"><div><b>⚠ Checklist de QA pendiente</b>W.O. ${esc(f.o.wo)} · Corrida ${f.c.num}${due.length>1?` · +${due.length-1} más`:''}</div><button class="btn" style="background:#fff;color:var(--amber)" onclick="openQA('${f.o.id}',${f.c.num})">Realizar QA</button></div>`;
}

/* OPERATOR */
function renderOperator(){
  if(S.view==="neworder"){renderNewOrder();return}
  if(S.view==="order"){renderOrderScreen();return}
  const right=`<button class="btn btn-blue" onclick="newOrder()">+ Orden</button>`;
  const mine=S.orders.filter(o=>o.createdBy===S.user.name);
  app().innerHTML=topbar(right)+`<div class="wrap">${qaBannerHTML(mine)}<div class="center pt30">
    <div class="hero">PX</div><h1 class="t">Órdenes de trabajo</h1>
    <p class="muted">Cada orden lleva 70 rollos. En cada corrida capturas turno, SKU, operador, máquina, arranque de línea y el peso/grosor de los 4 rollos.</p>
    <button class="big" onclick="newOrder()">+ Nueva orden de trabajo</button></div>

function corrChip(c,o){
  const ro=c.rolls.map(r=>r.rollo);const rng=ro.length?`${ro[0]}–${ro[ro.length-1]}`:"";
  let qa;
  if(c.qa&&c.qa.done){const ok=c.qa.navajasColocadas&&c.qa.navajasCortando&&c.qa.grosorAdecuado;qa=`<span class="qok" style="${ok?'':'background:#fee2e2;color:#b91c1c'}" onclick="openQA('${o.id}',${c.num})">QA ${ok?'✓':'⚠'} ${esc(c.qa.qaNum||c.qa.qaNombre||'')}</span>`}
  else if(qaDue(c))qa=`<button class="qbtn due" onclick="openQA('${o.id}',${c.num})">⚠ QA vencido</button>`;
  else qa=`<button class="qbtn" onclick="openQA('${o.id}',${c.num})">QA ${fmtRemain(c)}</button>`;
  return `<div class="corrrow"><div><div class="ttl">Corrida ${c.num} <span class="pill">${rng}</span> <span class="pill">${esc(c.turno)||'—'}</span></div>
    <div class="meta">SKU ${esc(c.sku||'—')} · ${esc(c.operadorNombre||'—')}${c.operadorNum?(' #'+esc(c.operadorNum)):''} · Máq ${esc(c.maquina||'—')}<br>Arranque ${esc(c.arranqueFecha)} ${esc(c.arranqueHora)} · Scrap ${esc(c.scrapPeso)||0} ${esc(c.scrapUnidad)}</div></div>
    <div>${qa}</div></div>`;
}
function setCF(k,v){S.cform[k]=v;render()}

function bindCform(){
  document.querySelectorAll("[data-cf]").forEach(el=>el.addEventListener("input",e=>{
    const k=el.dataset.cf,val=e.target.value;
    if(k==="peso")S.cform.pesos[Number(el.dataset.i)]=val;
    else if(k==="grosor")S.cform.grosores[Number(el.dataset.i)]=val;
    else if(k==="scrap"){S.cform.scrapPeso=val;const cc=$("#cfconv");if(cc)cc.textContent=Number(S.cform.scrapPeso)?conv(S.cform.scrapPeso,S.cform.scrapUnidad):""}
    else S.cform[k]=val;

  }));
  updateAddc();
}
function updateAddc(){const b=$("#addc");if(!b)return;const cf=S.cform;b.disabled=!(cf.turno&&((cf.operadorNum||'').trim()||(cf.operadorNombre||'').trim()))}
function addCorrida(){const o=curOrder();if(!o)return;const existing=allRolls(o).length;const start=existing+1;const left=MAXROLLS-existing;const count=Math.min(4,left);if(count<=0)return;
  const cf=S.cform;if(!(cf.turno&&((cf.operadorNum||'').trim()||(cf.operadorNombre||'').trim())))return;

  o.corridas.push({num:o.corridas.length+1,turno:cf.turno,sku:cf.sku,operadorNombre:cf.operadorNombre,operadorNum:cf.operadorNum,maquina:cf.maquina,inicioFecha:cf.inicioFecha,inicioHora:cf.inicioHora,arranqueFecha:cf.arranqueFecha,arranqueHora:cf.arranqueHora,arranqueTs:parseTs(cf.arranqueFecha,cf.arranqueHora),scrapPeso:cf.scrapPeso,scrapUnidad:cf.scrapUnidad,fecha:today(),hora:now(),rolls,qa:null});
  S.cform=newCform();save(S.orders);render();toast("Corrida agregada ("+count+" rollos)")}

/* QA CHECKLIST */

    <div class="mbody">

    </div></div>`;

  updateQASave();
}
function scanQA(){openScanner('Gafete de calidad',t=>{S.qaForm.qaNum=t;renderQAModal()})}
function qaValid(){const f=S.qaForm;return f.navajasColocadas!==null&&f.navajasCortando!==null&&f.grosorAdecuado!==null&&(f.qaNum||"").toString().trim()}

  c.qa={done:true,navajasColocadas:f.navajasColocadas,navajasCortando:f.navajasCortando,grosorAdecuado:f.grosorAdecuado,nota:f.nota||"",qaNombre:f.qaNombre||"",qaNum:f.qaNum||"",fecha:today(),hora:now()};

function orderCardMgr(o){const n=allRolls(o).length,tot=allRolls(o).reduce((s,r)=>s+(Number(r.peso)||0),0);const pend=(o.corridas||[]).some(qaDue);

  let ctab="";if((o.corridas||[]).length){ctab=`<div class="ctabwrap"><table class="ctab"><tr><th>Corr.</th><th>Turno</th><th>SKU</th><th>Operador</th><th>Máquina</th><th>Scrap</th><th>QA</th></tr>${o.corridas.map(c=>{let q="Pend.";if(c.qa&&c.qa.done){const ok=c.qa.navajasColocadas&&c.qa.navajasCortando&&c.qa.grosorAdecuado;q=(ok?"OK":"Revisar")+(c.qa.qaNum?(" #"+esc(c.qa.qaNum)):"")}else if(qaDue(c))q="Vencido";return `<tr><td>${c.num}</td><td>${esc(c.turno)||'—'}</td><td>${esc(c.sku)||'—'}</td><td>${esc(c.operadorNombre||'—')}${c.operadorNum?(' #'+esc(c.operadorNum)):''}</td><td>${esc(c.maquina)||'—'}</td><td>${esc(c.scrapPeso)||'0'} ${esc(c.scrapUnidad)}</td><td>${q}</td></tr>`}).join("")}</table></div>`}
  const el=document.createElement("div");el.className="ov";el.id="ov";el.onclick=e=>{if(e.target===el)closeDetail()};
  el.innerHTML=`<div class="modal"><div class="mhead"><div><b>W.O. ${esc(o.wo)}</b><div><small>Film Line ${esc(o.filmLine)} · ${o.finFecha?'Finalizada':'En proceso'}</small></div></div><button onclick="closeDetail()" style="color:#fff;padding:6px">✕</button></div>
    <div class="mbody">
      ${dr("Rollos registrados",n+" / 70")}${dr("Peso total",tot.toFixed(1)+" lbs")}${dr("Corridas",(o.corridas||[]).length)}${dr("Scrap total",orderScrapLbs(o).toFixed(1)+" lbs")}
      ${dr("Año / Grosor nom. / Mezcla",`${o.anio} / ${o.grosor||'—'} / ${o.mezcla||'—'}`)}${dr("Series / Lote",`${o.series} / ${o.lote||'—'}`)}
      ${dr("Inicio",`${o.inicioFecha} ${o.inicioHora}`)}${dr("Fin",o.finFecha?`${o.finFecha} ${o.finHora}`:"—")}${dr("Capturó",o.createdBy)}
      ${ctab?`<div class="lbl" style="margin-top:14px">Corridas</div>${ctab}`:""}
      <button class="btn btn-dark full" style="margin-top:16px" onclick="printRunsheet('${o.id}')">🖨 Imprimir Run Sheet (PDF)</button>
    </div></div>`;document.body.appendChild(el);
}

/* PRINT RUN SHEET (TFP-0041) */
function printRunsheet(id){const o=S.orders.find(x=>x.id===id);if(!o)return;$("#printarea").innerHTML=buildSheet(o);setTimeout(()=>{try{window.print()}catch(e){}},80)}
function buildSheet(o){
  const rolls=allRolls(o);const byRollo={};rolls.forEach(r=>byRollo[r.rollo]=r);
  function rowsHTML(from,to){let h=`<table><tr><th>WO #</th><th>FECHA</th><th>HORA</th><th>W/U</th><th>ROLLO</th><th>PESO</th><th>GROSOR</th></tr>`;
    for(let n=from;n<=to;n++){const r=byRollo[p3(n)];h+=`<tr><td>${r?esc(o.wo):"&nbsp;"}</td><td>${r?esc(r.fecha):""}</td><td>${r?esc(r.hora):""}</td><td>${r?r.wu:""}</td><td class="rn">${p3(n)}</td><td>${r?esc(r.peso):""}</td><td>${r?esc(r.grosor):""}</td></tr>`}
    return h+"</table>"}
  const box=(v,l)=>`<div class="lbx"><div class="lb">${esc(v)||"&nbsp;"}</div><small>${l}</small></div>`;
  function qaCell(c){if(c.qa&&c.qa.done){const ok=c.qa.navajasColocadas&&c.qa.navajasCortando&&c.qa.grosorAdecuado;return (ok?"OK":"REVISAR")+(c.qa.qaNum?(" #"+esc(c.qa.qaNum)):"")}return qaDue(c)?"VENCIDO":"PENDIENTE"}
  let csum="";if((o.corridas||[]).length){csum=`<div class="csum"><div class="h">CORRIDAS · TURNO · SKU · OPERADOR · MÁQUINA · ARRANQUE · SCRAP · QA</div><table><tr><th>CORR</th><th>ROLLOS</th><th>TURNO</th><th>SKU</th><th>OPERADOR</th><th>MÁQ</th><th>ARRANQUE</th><th>SCRAP</th><th>QA</th></tr>`+
    o.corridas.map(c=>{const ro=c.rolls.map(r=>r.rollo);const rng=ro.length?`${ro[0]}–${ro[ro.length-1]}`:"";return `<tr><td class="rn">${c.num}</td><td>${rng}</td><td>${esc(c.turno)}</td><td>${esc(c.sku)}</td><td>${esc(c.operadorNombre)}${c.operadorNum?(" #"+esc(c.operadorNum)):""}</td><td>${esc(c.maquina)}</td><td>${esc(c.arranqueFecha)} ${esc(c.arranqueHora)}</td><td>${esc(c.scrapPeso)||"0"} ${esc(c.scrapUnidad)}</td><td>${qaCell(c)}</td></tr>`}).join("")+
    `<tr><td colspan="7" style="text-align:right;font-weight:700">SCRAP TOTAL</td><td colspan="2" style="font-weight:700">${orderScrapLbs(o).toFixed(1)} lbs</td></tr></table></div>`}
  return `<div class="rs">
    <div class="tt">REGISTRO DE ROLLOS DE FILM LINE<br>(FILM LINE RUN SHEET)</div>
    <div class="rscols">${rowsHTML(1,35)}${rowsHTML(36,70)}</div>
    <div class="note">EL TURNO QUE REALICE CUALQUIER CAMBIO DEBE LLENAR HOJAS NUEVAS AL MOMENTO DE LA FECHA DE FINALIZACIÓN</div>
    ${csum}
    <div class="series">Series<br>${esc(o.series)}</div>
    <div class="lote"><b>Lote #</b>${box(o.lote,"")}${box(o.filmLine,"Film Line #")}${box(o.anio,"Año")}${box(o.grosor,"Grosor nom.")}${box(o.mezcla,"Mezcla")}${box(o.wo,"WO #")}</div>
    <div class="times">Inicio Fecha/Hora: <b>${esc(o.inicioFecha)} ${esc(o.inicioHora)}</b> &nbsp;&nbsp;&nbsp; Fin Fecha/Hora: <b>${o.finFecha?esc(o.finFecha)+" "+esc(o.finHora):"________"}</b></div>
    <div class="foot"><span>TFP-0041 Registro de Produccion Film Line · Rev. 0 · Fecha de Rev: 10/30/2023</span><span>Generado por PRAXA Control</span></div>
  </div>`;
}

function toast(m){const t=document.createElement("div");t.className="toast";t.textContent="✓ "+m;document.body.appendChild(t);setTimeout(()=>t.remove(),2300)}

/* SCANNER (genérico con callback) */
let _sc=null,_scCb=null;
function openScanner(label,cb){_scCb=cb;const ov=document.createElement("div");ov.className="scan-ov";ov.id="scanov";
  ov.innerHTML=`<div class="scan-top"><b>Escanear ${esc(label)}</b><button style="color:#fff" onclick="closeScanner()">✕</button></div><div id="reader"></div><div id="scanerr" class="scan-err"></div><div class="scan-bottom">Apunta al código de barras o QR<button class="mbtn" onclick="closeScanner()">Capturar manualmente</button></div>`;
  document.body.appendChild(ov);startScan()}
function startScan(){if(typeof Html5Qrcode==="undefined"){scanErr("La librería de escaneo no cargó (revisa internet).");return}
  try{_sc=new Html5Qrcode("reader",{verbose:false})}catch(e){scanErr("No se pudo iniciar.");return}
  _sc.start({facingMode:"environment"},{fps:10,qrbox:{width:260,height:170}},onScan,()=>{}).catch(()=>scanErr("No se pudo abrir la cámara. Da permiso en Safari/Chrome o captura manualmente."))}
function onScan(t){const cb=_scCb;closeScanner();if(cb)cb(t);toast("Escaneado: "+t)}
function scanErr(m){const e=document.getElementById("scanerr");if(e)e.textContent=m}
function closeScanner(){const done=()=>{const o=document.getElementById("scanov");if(o)o.remove()};if(_sc){_sc.stop().then(()=>{try{_sc.clear()}catch(e){}_sc=null;done()}).catch(()=>{_sc=null;done()})}else done()}

/* ALERTA QA PERIÓDICA */
setInterval(()=>{
  if(!S.user)return;
  let newly=false;
  scopeOrders().forEach(o=>(o.corridas||[]).forEach(c=>{const id=o.id+":"+c.num;if(qaDue(c)&&!S.qaAlerted.has(id)){S.qaAlerted.add(id);newly=true}}));
  if(newly){
    toast("Checklist de QA pendiente");
    const ae=document.activeElement,typing=ae&&/INPUT|TEXTAREA/.test(ae.tagName);
    if(!document.getElementById("scanov")&&!document.getElementById("qaov")&&!typing){try{render()}catch(e){}}
  }
},30000);

/* ICON + MANIFEST */
function mkIcon(sz){const c=document.createElement("canvas");c.width=c.height=sz;const x=c.getContext("2d");rr(x,0,0,sz,sz,sz*0.22);x.fillStyle="#15314F";x.fill();x.fillStyle="#3880C8";rr(x,sz*0.24,sz*0.24,sz*0.52,sz*0.52,sz*0.10);x.fill();x.fillStyle="#fff";x.font="bold "+(sz*0.26)+"px Arial";x.textAlign="center";x.textBaseline="middle";x.fillText("PX",sz/2,sz*0.52);return c.toDataURL("image/png")}
function rr(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath()}
try{document.getElementById("touch-icon").href=mkIcon(180);const man={name:"Registro de Rollos Film Line",short_name:"Hoja de Trabajo",start_url:".",display:"standalone",background_color:"#15314F",theme_color:"#15314F",icons:[{src:mkIcon(512),sizes:"512x512",type:"image/png"},{src:mkIcon(192),sizes:"192x192",type:"image/png"}]};document.getElementById("manifest-link").href=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:"application/json"}))}catch(e){}

render();
</script>
