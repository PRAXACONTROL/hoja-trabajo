<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hoja de Trabajo">
<meta name="theme-color" content="#15314F">
<title>Hoja de Trabajo · RIVULIS</title>
<link id="touch-icon" rel="apple-touch-icon" href="">
<link id="manifest-link" rel="manifest" href="">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{--navy:#15314F;--blue:#3880C8;--ink:#0f172a;--sub:#475569;--mut:#94a3b8;--line:#e2e8f0;--bg:#eef2f6;--soft:#eff6ff;--green:#059669;--red:#ef4444}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  button,input,select{font-family:inherit}button{cursor:pointer;border:none;background:none}input,select{outline:none}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 90px}
  .top{background:var(--navy);color:#fff;position:sticky;top:0;z-index:30;box-shadow:0 1px 4px rgba(0,0,0,.2);padding-top:env(safe-area-inset-top)}
  .top-in{max-width:760px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{background:var(--blue);color:#fff;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
  .brand b{font-size:14px;line-height:1.1}.brand small{font-size:11px;color:#9db8d6;display:block}
  .row{display:flex;align-items:center;gap:6px}
  .btn{padding:9px 13px;border-radius:10px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .btn-blue{background:var(--blue);color:#fff}.btn-ghost{color:#fff}.btn-ghost:active{background:#23476e}
  .btn-dark{background:var(--navy);color:#fff}.btn-dark:disabled{opacity:.3}
  .btn-green{background:var(--green);color:#fff}
  .login{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:20px}
  .lc{width:100%;max-width:360px}
  .lh{text-align:center;margin-bottom:24px}
  .lh .lg{background:var(--blue);width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-weight:800;font-size:20px;color:#fff}
  .lh h1{color:#fff;font-size:21px}.lh p{color:#9db8d6;font-size:13px;margin-top:3px}
  .lh .badge{display:inline-block;margin-top:8px;font-size:11px;font-weight:800;background:rgba(56,128,200,.25);color:#9db8d6;padding:3px 9px;border-radius:99px}
  .card{background:#fff;border-radius:16px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .inp{width:100%;border:2px solid var(--line);border-radius:11px;padding:12px 13px;font-size:16px;transition:.15s}.inp:focus{border-color:var(--blue)}
  .ipos{position:relative}.ipos .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:15px}
  .inp.pad{padding-left:38px}
  .stack>*+*{margin-top:11px}
  .full{width:100%;justify-content:center;padding:13px}
  .err{color:var(--red);font-size:14px}
  .accts{margin-top:18px;padding-top:15px;border-top:1px solid var(--line)}
  .accts p{font-size:12px;color:var(--mut);text-align:center;margin-bottom:8px}
  .ag{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .acct{border:1px solid var(--line);border-radius:11px;padding:10px;text-align:left}.acct b{font-size:14px;color:var(--navy)}.acct small{font-size:11px;color:var(--mut);display:block}
  .center{text-align:center}.pt40{padding-top:38px}
  .hero{width:74px;height:74px;border-radius:18px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-weight:800;font-size:24px}
  h1.t{font-size:22px;color:var(--navy)}.muted{color:var(--sub);margin-top:6px}
  .big{background:var(--navy);color:#fff;padding:16px 28px;border-radius:16px;font-weight:700;font-size:17px;display:inline-flex;gap:8px;align-items:center;margin-top:24px}
  .pt24{padding-top:20px}
  .prog{display:flex;gap:5px;margin-bottom:6px}
  .pg{flex:1;height:6px;border-radius:3px;background:var(--line)}.pg.on{background:var(--blue)}.pg.done{background:var(--green)}
  .stepn{font-size:12px;color:var(--mut);margin-bottom:14px}
  .panel{background:#fff;border-radius:16px;border:1px solid var(--line);padding:20px;min-height:300px}
  .stitle{font-size:19px;font-weight:800;color:var(--navy);margin-bottom:3px}
  .shint{color:var(--sub);font-size:13px;margin-bottom:16px}
  .lbl{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-bottom:5px}
  .field+.field{margin-top:13px}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .scanbtn{margin-top:7px;width:100%;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--navy);color:#fff;padding:11px;border-radius:11px;font-weight:600;font-size:14px}
  .shifts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .shift{padding:12px;border-radius:11px;font-weight:800;font-size:17px;border:2px solid var(--line);background:#fff;color:var(--sub)}.shift.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .seg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .seg button{padding:11px;border-radius:11px;font-weight:700;border:2px solid var(--line);background:#fff;color:var(--sub)}.seg button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .conv{font-size:12px;color:var(--blue);margin-top:6px;font-weight:600}
  .nav{display:flex;justify-content:space-between;margin-top:18px}
  .rec{width:100%;background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px;text-align:left;display:flex;justify-content:space-between;gap:12px;margin-top:9px}
  .rec:active{border-color:var(--blue)}
  .rec .o{font-weight:800;color:var(--navy)}
  .pill{font-size:11px;background:#f1f5f9;color:var(--sub);padding:2px 8px;border-radius:99px}
  .meta{font-size:12.5px;color:var(--sub);margin-top:5px}
  .empty{text-align:center;color:var(--mut);padding:50px 0}
  .search{position:relative;margin:12px 0}.search .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mut)}
  .search input{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 11px 11px 36px;font-size:16px}
  .sectit{display:flex;justify-content:space-between;align-items:center;margin:18px 0 2px}.sectit h2{font-size:18px;color:var(--navy)}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;display:flex;align-items:flex-end;justify-content:center}
  @media(min-width:560px){.ov{align-items:center;padding:16px}}
  .modal{background:#fff;width:100%;max-width:560px;border-radius:18px 18px 0 0;max-height:92vh;overflow:auto}
  @media(min-width:560px){.modal{border-radius:18px}}
  .mhead{position:sticky;top:0;background:var(--navy);color:#fff;padding:15px 18px;display:flex;justify-content:space-between;align-items:center}
  .mhead b{font-size:17px}.mhead small{color:#9db8d6;font-size:12px}
  .mbody{padding:16px 18px}
  .drow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f1f5f9;font-size:13.5px}.drow .k{color:var(--sub)}.drow .v{font-weight:600;text-align:right}
  .toast{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:60;background:var(--green);color:#fff;padding:12px 18px;border-radius:11px;font-weight:600;font-size:14px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
  .scan-ov{position:fixed;inset:0;background:#000;z-index:80;display:flex;flex-direction:column}
  .scan-top{padding:calc(14px + env(safe-area-inset-top)) 18px 14px;background:var(--navy);color:#fff;display:flex;justify-content:space-between;align-items:center}.scan-top b{font-size:16px}
  #reader{flex:1;width:100%;overflow:hidden;background:#000}#reader video{width:100%!important;height:100%!important;object-fit:cover}
  .scan-err{color:#fca5a5;font-size:13px;padding:0 18px 10px;text-align:center;background:var(--navy)}
  .scan-bottom{padding:18px;padding-bottom:calc(18px + env(safe-area-inset-bottom));background:var(--navy);color:#cbd5e1;text-align:center;font-size:14px}
  .scan-bottom .mbtn{margin-top:12px;width:100%;background:#fff;color:var(--navy);padding:13px;border-radius:12px;font-weight:700}
  #printarea{display:none}
  @media print{body{background:#fff}#app{display:none!important}.toast{display:none!important}#printarea{display:block}@page{margin:1.2cm}}
  .rsheet{font-family:Arial,sans-serif;color:#000;max-width:740px;margin:0 auto}
  .rstop{text-align:center;font-size:16px;font-weight:800;letter-spacing:1px;border:2px solid #000;padding:7px}
  .rsprint{display:flex;justify-content:space-between;font-size:11px;padding:4px 2px 8px}
  .rsheet table{width:100%;border-collapse:collapse}
  .rsheet td{border:1.3px solid #000;padding:6px 8px;font-size:12.5px}
  .rsheet .l{font-weight:700;width:46%;background:#f3f4f6}
  .rsheet .sect{background:#15314F;color:#fff;font-weight:700;text-align:center;font-size:12px}
  .rsheet .sub{font-weight:700;background:#fafafa;text-align:center}
  .rsheet .mono{font-family:Consolas,monospace;font-weight:700}
  .rsheet .rl{font-weight:800;text-align:center;background:#f3f4f6;width:30px}
  .rsfoot{text-align:center;font-size:10.5px;color:#475569;margin-top:10px}
</style>

<div id="app"></div>
<div id="printarea"></div>

<script>
const KEY="hoja-runsheets-v2";
const SHIFTS=["T1","T2","T3"];
const ACCOUNTS=[
  {user:"operador",pass:"1234",name:"Operador Demo",role:"operador"},
  {user:"gerente",pass:"1234",name:"Gerente Demo",role:"gerente"},
];
const mem={v:null};
function load(){try{return JSON.parse(localStorage.getItem(KEY)||"[]")}catch(e){return mem.v||[]}}
function save(v){mem.v=v;try{localStorage.setItem(KEY,JSON.stringify(v))}catch(e){}}

function newForm(){return{producto:"",wo:"",filmLine:"",corrida:"",reel:"",calibre:"",blend:"HDPE",wu1:"",wu2:"",wu3:"",wu4:"",fechaInicio:"",turnoInicio:"",horaInicio:"",operadorInicio:"",fechaTermino:"",turnoTermino:"",horaTermino:"",operadorTermino:"",inspeccionadoPor:"",footage:"",scrapPeso:"",scrapUnidad:"lbs"}}
const S={user:null,records:load(),view:"home",step:1,form:newForm(),query:"",detail:null};

function today(){const d=new Date();return p2(d.getDate())+"/"+p2(d.getMonth()+1)+"/"+d.getFullYear()}
function now(){const d=new Date();return p2(d.getHours())+":"+p2(d.getMinutes())}
function p2(n){return String(n).padStart(2,"0")}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function conv(v,u){v=Number(v)||0;return u==="lbs"?`${v} lbs (${(v*0.453592).toFixed(1)} kg)`:`${v} kg (${(v/0.453592).toFixed(1)} lbs)`}

const ICO={user:'◑',lock:'▦',cam:'◎'};
const $=s=>document.querySelector(s);
const app=()=>$("#app");
function render(){if(!S.user){renderLogin();return}if(S.user.role==="operador")renderOperator();else renderManager()}

function renderLogin(){
  app().innerHTML=`<div class="login"><div class="lc">
    <div class="lh"><div class="lg">PX</div><h1>Hoja de Trabajo</h1><p>PRAXA Control · RIVULIS</p><span class="badge">DEMO</span></div>
    <div class="card"><div class="stack">
      <div class="ipos"><span class="ic">${ICO.user}</span><input id="u" class="inp pad" placeholder="Usuario"></div>
      <div class="ipos"><span class="ic">${ICO.lock}</span><input id="p" type="password" class="inp pad" placeholder="Contraseña"></div>
      <div id="le"></div>
      <button class="btn btn-dark full" onclick="doLogin()">Entrar</button>
    </div>
    <div class="accts"><p>Cuentas demo (toca para usar)</p><div class="ag">
      <button class="acct" onclick="quick(0)"><b>Operador</b><small>operador / 1234</small></button>
      <button class="acct" onclick="quick(1)"><b>Gerente</b><small>gerente / 1234</small></button>
    </div></div></div>
  </div></div>`;
  $("#p").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
}
function quick(i){$("#u").value=ACCOUNTS[i].user;$("#p").value=ACCOUNTS[i].pass;$("#le").innerHTML=""}
function doLogin(){const u=$("#u").value.trim().toLowerCase(),p=$("#p").value.trim();const a=ACCOUNTS.find(x=>x.user===u&&x.pass===p);if(a){S.user=a;S.view="home";render()}else $("#le").innerHTML='<div class="err">Usuario o contraseña incorrectos</div>'}
function logout(){S.user=null;render()}

function topbar(right){return `<div class="top"><div class="top-in">
  <div class="brand"><div class="logo">PX</div><div><b>Hoja de Trabajo</b><small>${esc(S.user.name)} · ${S.user.role==="operador"?"Operador":"Gerente"}</small></div></div>
  <div class="row">${right||""}<button class="btn btn-ghost" onclick="logout()">Salir</button></div>
</div></div>`}

function renderOperator(){
  const right=`<button class="btn btn-blue" onclick="startW()">+ Nuevo</button>`;
  if(S.view==="wizard"){app().innerHTML=topbar(right)+`<div class="wrap">${wizardHTML()}</div>`;afterWizard();return}
  const mine=S.records.filter(r=>r.createdBy===S.user.name).slice(0,6);
  app().innerHTML=topbar(right)+`<div class="wrap"><div class="center pt40">
    <div class="hero">PX</div><h1 class="t">Nueva hoja de corrida</h1>
    <p class="muted">Captura los datos del Film Line; al guardar se genera el Run Sheet en PDF.</p>
    <button class="big" onclick="startW()">+ Nueva hoja de trabajo</button>
    ${mine.length?`<div style="text-align:left;margin-top:30px"><div class="stepn" style="font-weight:700">Mis últimas hojas</div>${mine.map(recCard).join("")}</div>`:""}
  </div></div>`;
}
function startW(){S.form=newForm();S.step=1;S.view="wizard";render()}

const STEPS=6;
function f(k){return esc(S.form[k])}
function wizardHTML(){
  let bars="";for(let i=1;i<=STEPS;i++)bars+=`<div class="pg ${S.step>i?'done':S.step===i?'on':''}"></div>`;
  return `<div class="pt24"><div class="prog">${bars}</div><div class="stepn">Paso ${S.step} de ${STEPS}</div>
  <div class="panel">${stepBody()}</div>
  <div class="nav">
    ${S.step===1?`<button class="btn" style="color:var(--sub)" onclick="cancelW()">Cancelar</button>`:`<button class="btn" style="color:var(--navy)" onclick="goStep(${S.step-1})">← Atrás</button>`}
    ${S.step<STEPS?`<button id="nx" class="btn btn-dark" onclick="goStep(${S.step+1})">Siguiente →</button>`:`<button id="nx" class="btn btn-green" onclick="saveRec()">✓ Guardar y generar</button>`}
  </div></div>`;
}
function cancelW(){S.view="home";render()}
function goStep(n){if(n>S.step&&!canNext())return;if(n<1)return;S.step=n;render()}

function tF(label,k,ph,type){return `<div class="field"><label class="lbl">${label}</label><input class="inp" data-k="${k}" value="${f(k)}" placeholder="${ph||''}" ${type?`type="${type}"`:''}></div>`}
function scanF(label,k,ph){return `<div class="field"><label class="lbl">${label}</label><input class="inp" data-k="${k}" value="${f(k)}" placeholder="${ph||''}"><button class="scanbtn" onclick="openScanner('${k}','${label.replace(/'/g,'')}')">${ICO.cam} Escanear con cámara</button></div>`}
function shiftsF(label,k){return `<div class="field"><label class="lbl">${label}</label><div class="shifts">${SHIFTS.map(s=>`<button class="shift ${S.form[k]===s?'on':''}" onclick="setF('${k}','${s}')">${s}</button>`).join("")}</div></div>`}

function stepBody(){
  const F=S.form;
  switch(S.step){
    case 1:return `<div class="stitle">Producto y orden</div><div class="shint">Identificación de la corrida.</div>
      ${tF("Producto","producto","Ej. 508/243")}
      ${scanF("Work Order (W.O.#)","wo","Escanea o escribe")}
      ${tF("Film Line #","filmLine","Ej. 8")}`;
    case 2:return `<div class="stitle">Rollo</div><div class="shint">Corrida, reel, calibre y blend.</div>
      <div class="g2">${tF("Corrida (Run)","corrida","Ej. 279")}${tF("Rollo (Reel)","reel","Ej. 36")}</div>
      <div class="g2" style="margin-top:13px">${tF("Calibre","calibre","")}${tF("Blend","blend","HDPE")}</div>`;
    case 3:return `<div class="stitle">Números de rastreo (W/U)</div><div class="shint">4 rollos por corrida (W/U #1–4). Se generan con el número de corrida.</div>
      ${tF("W/U #1","wu1","")}${tF("W/U #2","wu2","")}${tF("W/U #3","wu3","")}${tF("W/U #4","wu4","")}`;
    case 4:return `<div class="stitle">Inicio</div><div class="shint">Operador, fecha, turno y hora de arranque.</div>
      ${scanF("Operador (inicio)","operadorInicio","Escanea gafete")}
      ${tF("Fecha de inicio","fechaInicio","")}
      ${shiftsF("Turno de inicio","turnoInicio")}
      ${tF("Hora de inicio","horaInicio","","time")}`;
    case 5:return `<div class="stitle">Cierre</div><div class="shint">Término e inspección.</div>
      ${tF("Fecha de término","fechaTermino","")}
      ${shiftsF("Turno que terminó","turnoTermino")}
      ${tF("Hora de término","horaTermino","","time")}
      ${tF("Operador (término)","operadorTermino","")}
      ${tF("Inspeccionado por","inspeccionadoPor","Ej. ALFREDO")}`;
    case 6:{const c=conv(F.scrapPeso,F.scrapUnidad);return `<div class="stitle">Producción y scrap</div><div class="shint">Footage y scrap por peso.</div>
      ${tF("Footage (pies)","footage","Ej. 21930")}
      <div class="field"><label class="lbl">Unidad de scrap</label><div class="seg">
        <button class="${F.scrapUnidad==='lbs'?'on':''}" onclick="setF('scrapUnidad','lbs')">Libras (lbs)</button>
        <button class="${F.scrapUnidad==='kg'?'on':''}" onclick="setF('scrapUnidad','kg')">Kilos (kg)</button></div></div>
      <div class="field"><label class="lbl">Scrap (peso)</label><input class="inp" data-k="scrapPeso" type="number" step="0.1" inputmode="decimal" value="${f('scrapPeso')}" placeholder="0">
        <div class="conv" id="convv">${Number(F.scrapPeso)?c:''}</div></div>`;}
  }
}
function setF(k,v){S.form[k]=v;render()}
function afterWizard(){
  if(S.step===4&&!S.form.fechaInicio){S.form.fechaInicio=today();S.form.horaInicio=now();const a=document.querySelector('[data-k=fechaInicio]'),b=document.querySelector('[data-k=horaInicio]');if(a)a.value=today();if(b)b.value=S.form.horaInicio}
  if(S.step===5&&!S.form.fechaTermino){S.form.fechaTermino=today();S.form.horaTermino=now();const a=document.querySelector('[data-k=fechaTermino]'),b=document.querySelector('[data-k=horaTermino]');if(a)a.value=today();if(b)b.value=S.form.horaTermino}
  if(S.step===3){const F=S.form;if(F.corrida){[1,2,3,4].forEach(n=>{const k="wu"+n;if(!F[k]){F[k]=`${F.corrida}-${n}`;const el=document.querySelector(`[data-k=${k}]`);if(el)el.value=F[k]}})}}
  document.querySelectorAll("[data-k]").forEach(el=>el.addEventListener("input",e=>{S.form[el.dataset.k]=e.target.value;const c=document.getElementById("convv");if(c&&el.dataset.k==="scrapPeso")c.textContent=Number(S.form.scrapPeso)?conv(S.form.scrapPeso,S.form.scrapUnidad):"";updateNext()}));
  updateNext();
}
function canNext(){const F=S.form;switch(S.step){
  case 1:return F.producto.trim()&&F.wo.trim()&&F.filmLine.trim();
  case 2:return F.corrida.trim()&&F.reel.trim();
  case 3:return true;
  case 4:return F.operadorInicio.trim()&&F.fechaInicio&&F.turnoInicio&&F.horaInicio;
  case 5:return F.fechaTermino&&F.turnoTermino&&F.horaTermino;
  case 6:return F.scrapPeso!=="";
  default:return true}}
function updateNext(){const b=document.getElementById("nx");if(b)b.disabled=!canNext()}

function saveRec(){if(!canNext())return;const rec=Object.assign({},S.form,{id:Date.now().toString(),createdBy:S.user.name,createdAt:new Date().toISOString(),fechaImpresion:today()+" "+now()});S.records=[rec,...S.records];save(S.records);S.view="home";render();toast("Run Sheet guardado");S.detail=rec;renderModal()}

function recCard(r){return `<button class="rec" onclick="openDetail('${r.id}')"><div>
  <div><span class="o">${esc(r.producto)}</span> <span class="pill">W.O. ${esc(r.wo)}</span></div>
  <div class="meta">FL ${esc(r.filmLine)} · Run ${esc(r.corrida)} · Reel ${esc(r.reel)} · ${esc(r.fechaInicio)} ${esc(r.turnoInicio)}</div>
</div><div style="text-align:right"><div style="color:var(--red);font-weight:700">${esc(r.scrapPeso)} ${esc(r.scrapUnidad)}</div><div class="pill" style="margin-top:4px">PDF</div></div></button>`}

function renderManager(){
  const q=S.query.toLowerCase();
  const fl=S.records.filter(r=>!q||[r.producto,r.wo,r.filmLine,r.corrida,r.reel,r.operadorInicio,r.createdBy].some(x=>(x||"").toLowerCase().includes(q)));
  const tScrap=S.records.reduce((s,r)=>s+(r.scrapUnidad==="kg"?(Number(r.scrapPeso)||0)/0.453592:(Number(r.scrapPeso)||0)),0);
  app().innerHTML=topbar("")+`<div class="wrap">
    <div class="pt24"><h1 class="t">Panel del gerente</h1><p class="muted" style="font-size:13px">Hojas de corrida capturadas por los operadores.</p></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px">
      <div class="panel" style="min-height:auto;padding:14px"><div style="font-size:24px;font-weight:800;color:var(--navy)">${S.records.length}</div><div style="font-size:12px;color:var(--mut)">Run Sheets</div></div>
      <div class="panel" style="min-height:auto;padding:14px"><div style="font-size:24px;font-weight:800;color:var(--red)">${tScrap.toFixed(0)} lbs</div><div style="font-size:12px;color:var(--mut)">Scrap total</div></div>
    </div>
    <div class="search"><span class="ic">⌕</span><input id="q" value="${esc(S.query)}" placeholder="Buscar producto, W.O., run, operador…"></div>
    <div id="rl">${fl.length?fl.map(recCard).join(""):'<div class="empty">Sin registros aún.</div>'}</div>
  </div>`;
  const qi=$("#q");if(qi)qi.addEventListener("input",e=>{S.query=e.target.value;const q2=S.query.toLowerCase();const f2=S.records.filter(r=>!q2||[r.producto,r.wo,r.filmLine,r.corrida,r.reel,r.operadorInicio,r.createdBy].some(x=>(x||"").toLowerCase().includes(q2)));$("#rl").innerHTML=f2.length?f2.map(recCard).join(""):'<div class="empty">Sin resultados</div>'});
}

function openDetail(id){S.detail=S.records.find(r=>r.id===id);renderModal()}
function closeDetail(){S.detail=null;const m=$("#ov");if(m)m.remove()}
function renderModal(){const r=S.detail;if(!r)return;
  const dr=(k,v)=>`<div class="drow"><span class="k">${k}</span><span class="v">${esc(v)||"—"}</span></div>`;
  const el=document.createElement("div");el.className="ov";el.id="ov";el.onclick=e=>{if(e.target===el)closeDetail()};
  el.innerHTML=`<div class="modal"><div class="mhead"><div><b>${esc(r.producto)}</b><div><small>W.O. ${esc(r.wo)} · FL ${esc(r.filmLine)}</small></div></div><button onclick="closeDetail()" style="color:#fff;padding:6px">✕</button></div>
    <div class="mbody">
      ${dr("Corrida (Run)",r.corrida)}${dr("Rollo (Reel)",r.reel)}${dr("W/U",`${r.wu1} · ${r.wu2} · ${r.wu3} · ${r.wu4}`)}
      ${dr("Blend / Calibre",`${r.blend} / ${r.calibre||"—"}`)}
      ${dr("Inicio",`${r.fechaInicio} ${r.horaInicio} · ${r.turnoInicio} · ${r.operadorInicio}`)}
      ${dr("Término",`${r.fechaTermino} ${r.horaTermino} · ${r.turnoTermino}`)}
      ${dr("Inspeccionado por",r.inspeccionadoPor)}${dr("Footage",r.footage+" pies")}${dr("Scrap",conv(r.scrapPeso,r.scrapUnidad))}
      <button class="btn btn-dark full" style="margin-top:16px" onclick="printSheet(window.__cur())">🖨 Imprimir Run Sheet (PDF)</button>
    </div></div>`;
  document.body.appendChild(el);
}
window.__cur=()=>S.detail;

function printSheet(r){if(!r)return;$("#printarea").innerHTML=buildSheet(r);setTimeout(()=>window.print(),80)}
function buildSheet(r){
  const td=(l,v)=>`<tr><td class="l">${l}</td><td colspan="2">${esc(v)||"&nbsp;"}</td></tr>`;
  return `<div class="rsheet">
    <div class="rstop">FILM LINE RUN SHEET</div>
    <div class="rsprint"><span><b>Números de rastreo FL</b></span><span>Fecha de impresión: <b>${esc(r.fechaImpresion||"")}</b></span></div>
    <table>
      <tr><td class="sect" colspan="3">IDENTIFICACIÓN</td></tr>
      ${td("Producto",r.producto)}
      <tr><td class="l">Work Order (W.O.#)</td><td colspan="2" class="mono">${esc(r.wo)}</td></tr>
      ${td("Film Line #",r.filmLine)}${td("Corrida (Run)",r.corrida)}${td("Rollo (Reel)",r.reel)}
      <tr><td class="sect" colspan="3">ROLLO — NÚMEROS DE RASTREO (W/U)</td></tr>
      <tr><td class="rl" rowspan="4">R<br>O<br>L<br>L<br>O</td><td class="sub">W/U #1</td><td class="mono">${esc(r.wu1)}</td></tr>
      <tr><td class="sub">W/U #2</td><td class="mono">${esc(r.wu2)}</td></tr>
      <tr><td class="sub">W/U #3</td><td class="mono">${esc(r.wu3)}</td></tr>
      <tr><td class="sub">W/U #4</td><td class="mono">${esc(r.wu4)}</td></tr>
      ${td("Calibre",r.calibre)}${td("Blend",r.blend)}
      <tr><td class="sect" colspan="3">OPERACIÓN</td></tr>
      ${td("Fecha de inicio",r.fechaInicio)}${td("Turno de inicio",r.turnoInicio)}${td("Hora de inicio",r.horaInicio)}${td("Operador (inicio)",r.operadorInicio)}
      ${td("Fecha de término",r.fechaTermino)}${td("Turno que terminó",r.turnoTermino)}${td("Hora de término",r.horaTermino)}${td("Operador (término)",r.operadorTermino)}
      ${td("Inspeccionado por",r.inspeccionadoPor)}
      <tr><td class="sect" colspan="3">PRODUCCIÓN Y SCRAP</td></tr>
      <tr><td class="l">Footage (pies)</td><td colspan="2" class="mono">${esc(r.footage)}</td></tr>
      ${td("Scrap Weight ("+esc(r.scrapUnidad)+")",conv(r.scrapPeso,r.scrapUnidad))}
    </table>
    <div class="rsfoot">Generado por el Sistema de Hoja de Trabajo · PRAXA Control · soporte@praxacontrol.com · +52 (664) 304-3903</div>
  </div>`;
}

function toast(m){const t=document.createElement("div");t.className="toast";t.textContent="✓ "+m;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}

let _sc=null,_sf=null;
function openScanner(k,label){_sf=k;const ov=document.createElement("div");ov.className="scan-ov";ov.id="scanov";
  ov.innerHTML=`<div class="scan-top"><b>Escanear ${esc(label)}</b><button style="color:#fff" onclick="closeScanner()">✕</button></div><div id="reader"></div><div id="scanerr" class="scan-err"></div><div class="scan-bottom">Apunta al código de barras o QR<button class="mbtn" onclick="closeScanner()">Capturar manualmente</button></div>`;
  document.body.appendChild(ov);startScan()}
function startScan(){if(typeof Html5Qrcode==="undefined"){scanErr("La librería de escaneo no cargó (revisa internet).");return}
  try{_sc=new Html5Qrcode("reader",{verbose:false})}catch(e){scanErr("No se pudo iniciar.");return}
  _sc.start({facingMode:"environment"},{fps:10,qrbox:{width:260,height:170}},onScan,()=>{}).catch(()=>scanErr("No se pudo abrir la cámara. Da permiso en Safari/Chrome o captura manualmente. (En el editor la cámara puede estar bloqueada; en el sitio publicado funciona.)"))}
function onScan(t){S.form[_sf]=t;const i=document.querySelector(`[data-k=${_sf}]`);if(i)i.value=t;if(typeof updateNext==="function")updateNext();closeScanner();toast("Escaneado: "+t)}
function scanErr(m){const e=document.getElementById("scanerr");if(e)e.textContent=m}
function closeScanner(){const done=()=>{const o=document.getElementById("scanov");if(o)o.remove()};if(_sc){_sc.stop().then(()=>{try{_sc.clear()}catch(e){}_sc=null;done()}).catch(()=>{_sc=null;done()})}else done()}

function mkIcon(sz){const c=document.createElement("canvas");c.width=c.height=sz;const x=c.getContext("2d");rr(x,0,0,sz,sz,sz*0.22);x.fillStyle="#15314F";x.fill();x.fillStyle="#3880C8";rr(x,sz*0.24,sz*0.24,sz*0.52,sz*0.52,sz*0.10);x.fill();x.fillStyle="#fff";x.font="bold "+(sz*0.26)+"px Arial";x.textAlign="center";x.textBaseline="middle";x.fillText("PX",sz/2,sz*0.52);return c.toDataURL("image/png")}
function rr(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath()}
try{document.getElementById("touch-icon").href=mkIcon(180);const man={name:"Hoja de Trabajo",short_name:"Hoja Trabajo",start_url:".",display:"standalone",background_color:"#15314F",theme_color:"#15314F",icons:[{src:mkIcon(512),sizes:"512x512",type:"image/png"},{src:mkIcon(192),sizes:"192x192",type:"image/png"}]};document.getElementById("manifest-link").href=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:"application/json"}))}catch(e){}

render();
</script>
